# Nightly build: sync upstream → replay patches → build all platforms → publish nightly release.
#
# Every day at 09:00 Beijing time (UTC 01:00) it:
#   1. Fetches latest upstream (guimaraeslucas/axonasp) main,
#   2. Replays fork-specific patches,
#   3. Builds all OS packages + a :nightly Docker image,
#   4. Publishes/updates a rolling pre-release tagged `nightly`.
#
# NOTE: This workflow cannot use reusable workflow calls because GitHub
# restricts them in fork repositories. All build logic is inline.
# NOTE: We do NOT push to a nightly branch because GITHUB_TOKEN lacks
# `workflows` permission. Builds happen directly in the sync job's workspace.
name: Nightly Build

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-build
  cancel-in-progress: true

env:
  UPSTREAM_REPO: guimaraeslucas/axonasp

jobs:
  sync:
    name: Sync upstream & apply patches
    runs-on: ubuntu-latest
    outputs:
      upstream-sha: ${{ steps.upstream-sha.outputs.value }}
      upstream-date: ${{ steps.upstream-sha.outputs.date }}
      changed: ${{ steps.commit.outputs.changed }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch upstream main
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream main
      - name: Record upstream SHA
        id: upstream-sha
        run: |
          echo "value=$(git rev-parse upstream/main)" >> "$GITHUB_OUTPUT"
          echo "date=$(git log -1 --format=%ci upstream/main)" >> "$GITHUB_OUTPUT"
      - name: Overlay upstream code (keeps fork-only files)
        run: git checkout upstream/main -- .
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Replay fork patches
        run: bash nightly/apply.sh
      - name: Compute version string
        id: version
        run: |
          PATCH=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          REVISION=$(git rev-parse --short HEAD 2>/dev/null || echo "0")
          echo "value=2.3.${PATCH}.${REVISION}" >> "$GITHUB_OUTPUT"
      - name: Check if anything changed
        id: commit
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes vs previous state"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload patched workspace as artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: patched-workspace
          path: .
          retention-days: 1

  build:
    name: Build OS packages
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download patched workspace
        uses: actions/download-artifact@v4
        with:
          name: patched-workspace
          path: .
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install dependencies
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
      - name: Build Linux binaries
        env:
          FULL_VERSION: ${{ needs.sync.outputs.version }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-http ./server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-fastcgi ./fastcgi
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-cli ./cli
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-mcp ./mcp
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-admin ./admin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-service ./service
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-testsuite ./testsuite
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-fpm ./fpm
      - name: Generate Windows Resources
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          go generate ./...
      - name: Build Windows binaries
        env:
          FULL_VERSION: ${{ needs.sync.outputs.version }}
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-http.exe ./server
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-fastcgi.exe ./fastcgi
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-cli.exe ./cli
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-mcp.exe ./mcp
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-admin.exe ./admin
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-service.exe ./service
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-testsuite.exe ./testsuite
      - name: Remove test directory
        run: rm -rf ./www/test/ || true
      - name: Install nFPM
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm
      - name: Build Debian package
        env:
          VERSION: ${{ needs.sync.outputs.version }}
        run: nfpm package --packager deb --target .
      - name: Build Red Hat package
        env:
          VERSION: ${{ needs.sync.outputs.version }}
        run: nfpm package --packager rpm --target .
      - name: Build Alpine package
        env:
          VERSION: ${{ needs.sync.outputs.version }}
        run: nfpm package --packager apk --target .
      - name: Build Archlinux package
        env:
          VERSION: ${{ needs.sync.outputs.version }}
        run: nfpm package --packager archlinux --target .
      - name: Create Windows Portable Zip
        env:
          VERSION: ${{ needs.sync.outputs.version }}
        run: |
          mkdir -p axonasp-windows
          cp *.exe axonasp-windows/
          cp -r www config mcp LICENSE.txt LEGAL-DISCLAIMER.md global.asa iis-http.cmd install-service.ps1 uninstall-service.ps1 axonasp-windows/
          zip -r "axonasp-windows-${VERSION}-amd64.zip" axonasp-windows/
      - name: Build macOS ARM64 Zip
        env:
          VERSION: ${{ needs.sync.outputs.version }}
        run: |
          mkdir -p axonasp-macos-arm64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o axonasp-macos-arm64/axonasp-http ./server
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o axonasp-macos-arm64/axonasp-fastcgi ./fastcgi
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o axonasp-macos-arm64/axonasp-cli ./cli
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o axonasp-macos-arm64/axonasp-mcp ./mcp
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o axonasp-macos-arm64/axonasp-admin ./admin
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o axonasp-macos-arm64/axonasp-service ./service
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o axonasp-macos-arm64/axonasp-testsuite ./testsuite
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o axonasp-macos-arm64/axonasp-fpm ./fpm
          cp -r www config mcp LICENSE.txt LEGAL-DISCLAIMER.md global.asa axonasp-macos-arm64/
          zip -r "axonasp-macos-${VERSION}-arm64.zip" axonasp-macos-arm64/
      - name: Upload Packages as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: axonasp-packages
          path: |
            *.deb
            *.rpm
            *.apk
            *.pkg.tar.zst
            *.zip

  docker:
    name: Build Docker :nightly
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download patched workspace
        uses: actions/download-artifact@v4
        with:
          name: patched-workspace
          path: .
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push :nightly image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:nightly
          build-args: VERSION=${{ needs.sync.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
      - name: Smoke test — start container
        run: docker run -d --name axonasp-nightly -p 8801:8801 ghcr.io/${{ github.repository }}:nightly
      - name: Smoke test — wait for HTTP
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8801/ > /dev/null 2>&1; then
              echo "Server is up after ${i} seconds"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time"
          docker logs axonasp-nightly
          exit 1
      - name: Print container logs on failure
        if: failure()
        run: docker logs axonasp-nightly
      - name: Stop and remove container
        if: always()
        run: docker rm -f axonasp-nightly || true

  release:
    name: Publish nightly release
    needs: [sync, build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List release assets
        run: find artifacts -type f | sort
      - name: Publish rolling nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build (${{ needs.sync.outputs.upstream-date }})
          prerelease: true
          make_latest: 'false'
          body: |
            Automated nightly build.

            **Upstream commit:** `${{ needs.sync.outputs.upstream-sha }}`
            **Upstream date:** ${{ needs.sync.outputs.upstream-date }}
            **Built:** ${{ github.run_id }}

            This is an unverified automated build from the latest upstream code
            plus this fork's packaging patches. Not for production use.
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.apk
            artifacts/**/*.pkg.tar.zst
            artifacts/**/*.zip
            artifacts/**/*.tar.xz
            artifacts/**/*.pkg
            artifacts/**/*installer*.exe