# Nightly build: sync upstream → replay patches → build all platforms → publish nightly release.
#
# Every day at 09:00 Beijing time (UTC 01:00) it:
#   1. Fetches latest upstream (guimaraeslucas/axonasp) main,
#   2. Replays fork-specific patches,
#   3. Builds all OS packages + a :nightly Docker image,
#   4. Publishes/updates a rolling pre-release tagged `nightly`.
#
# NOTE: This workflow cannot use reusable workflow calls because GitHub
# restricts them in fork repositories. All build logic is inline.
# NOTE: We do NOT push to a nightly branch because GITHUB_TOKEN lacks
# `workflows` permission. Builds happen directly in the sync job's workspace.
name: Nightly Build

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-build
  cancel-in-progress: true

env:
  UPSTREAM_REPO: guimaraeslucas/axonasp

jobs:
  sync:
    name: Sync upstream & apply patches
    runs-on: ubuntu-latest
    outputs:
      upstream-sha: ${{ steps.upstream-sha.outputs.value }}
      upstream-date: ${{ steps.upstream-sha.outputs.date }}
      changed: ${{ steps.commit.outputs.changed }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch upstream main
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream main
      - name: Record upstream SHA
        id: upstream-sha
        run: |
          echo "value=$(git rev-parse upstream/main)" >> "$GITHUB_OUTPUT"
          echo "date=$(git log -1 --format=%ci upstream/main)" >> "$GITHUB_OUTPUT"
      - name: Overlay upstream code (keeps fork-only files)
        run: git checkout upstream/main -- .
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Replay fork patches
        run: bash nightly/apply.sh
      - name: Compute version string
        id: version
        run: |
          PATCH=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          REVISION=$(git rev-parse --short HEAD 2>/dev/null || echo "0")
          echo "value=2.3.${PATCH}.${REVISION}" >> "$GITHUB_OUTPUT"
      - name: Check if anything changed
        id: commit
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes vs previous state"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload patched workspace as artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: patched-workspace
          path: .
          retention-days: 1

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
          - { goos: freebsd, goarch: amd64 }
          - { goos: freebsd, goarch: arm64 }
    steps:
      - name: Download patched workspace
        uses: actions/download-artifact@v4
        with:
          name: patched-workspace
          path: .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Generate Windows resources
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          go generate ./...

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          FULL_VERSION: ${{ needs.sync.outputs.version }}
        run: |
          set -e
          LDFLAGS="-s -w -X main.Version=${FULL_VERSION}"
          EXT=""
          [ "${GOOS}" = "windows" ] && EXT=".exe"

          build_one() { go build -trimpath -ldflags "${LDFLAGS}" -o "$1" "./$2"; }

          build_one "axonasp-http$EXT"      server
          build_one "axonasp-fastcgi$EXT"   fastcgi
          build_one "axonasp-cli$EXT"       cli
          build_one "axonasp-mcp$EXT"       mcp
          build_one "axonasp-admin$EXT"     admin
          build_one "axonasp-service$EXT"   service
          build_one "axonasp-testsuite$EXT" testsuite
          # fpm is a Unix process manager, not built for Windows
          if [ "${GOOS}" != "windows" ]; then build_one "axonasp-fpm" fpm; fi

          echo "Built binaries:"
          ls -la axonasp-*

      # ──────────────────────────────────────────────────────────────
      # Linux: DEB / RPM / Alpine APK / Archlinux packages
      # ──────────────────────────────────────────────────────────────
      - name: Remove test directory from www
        if: matrix.goos == 'linux'
        run: rm -rf ./www/test/ || true

      - name: Install nFPM
        if: matrix.goos == 'linux'
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Build Linux packages (.deb .rpm .apk .pkg.tar.zst)
        if: matrix.goos == 'linux'
        env:
          VERSION: ${{ needs.sync.outputs.version }}
          ARCH: ${{ matrix.goarch }}
        run: |
          for packager in deb rpm apk archlinux; do
            echo ">>> Building ${packager} package for ${ARCH}"
            nfpm package --packager "${packager}" --target .
          done
          ls -la *.deb *.rpm *.apk *.pkg.tar.zst

      - name: Create Linux portable tarball (.tar.xz)
        if: matrix.goos == 'linux'
        env:
          VERSION: ${{ needs.sync.outputs.version }}
          ARCH: ${{ matrix.goarch }}
        run: |
          STAGE="axonasp-linux-${ARCH}"
          mkdir -p "${STAGE}"
          cp axonasp-http axonasp-fastcgi axonasp-cli axonasp-mcp \
             axonasp-admin axonasp-service axonasp-testsuite axonasp-fpm "${STAGE}/"
          cp -r www config mcp LICENSE.txt LEGAL-DISCLAIMER.md global.asa "${STAGE}/"
          tar -cJf "axonasp-linux-${VERSION}-${ARCH}.tar.xz" "${STAGE}/"
          ls -la axonasp-linux-*.tar.xz

      # ──────────────────────────────────────────────────────────────
      # Windows: portable zip
      # ──────────────────────────────────────────────────────────────
      - name: Create Windows portable zip
        if: matrix.goos == 'windows'
        env:
          VERSION: ${{ needs.sync.outputs.version }}
          ARCH: ${{ matrix.goarch }}
        run: |
          STAGE="axonasp-windows-${ARCH}"
          mkdir -p "${STAGE}"
          cp *.exe "${STAGE}/"
          cp -r www config mcp LICENSE.txt LEGAL-DISCLAIMER.md global.asa \
                iis-http.cmd install-service.ps1 uninstall-service.ps1 "${STAGE}/"
          zip -r "axonasp-windows-${VERSION}-${ARCH}.zip" "${STAGE}/"
          ls -la axonasp-windows-*.zip

      # ──────────────────────────────────────────────────────────────
      # macOS: portable zip
      # ──────────────────────────────────────────────────────────────
      - name: Create macOS portable zip
        if: matrix.goos == 'darwin'
        env:
          VERSION: ${{ needs.sync.outputs.version }}
          ARCH: ${{ matrix.goarch }}
        run: |
          STAGE="axonasp-macos-${ARCH}"
          mkdir -p "${STAGE}"
          cp axonasp-http axonasp-fastcgi axonasp-cli axonasp-mcp \
             axonasp-admin axonasp-service axonasp-testsuite axonasp-fpm "${STAGE}/"
          cp -r www config mcp LICENSE.txt LEGAL-DISCLAIMER.md global.asa "${STAGE}/"
          zip -r "axonasp-macos-${VERSION}-${ARCH}.zip" "${STAGE}/"
          ls -la axonasp-macos-*.zip

      # ──────────────────────────────────────────────────────────────
      # FreeBSD: portable tarball (.tar.xz)
      # ──────────────────────────────────────────────────────────────
      - name: Create FreeBSD portable tarball
        if: matrix.goos == 'freebsd'
        env:
          VERSION: ${{ needs.sync.outputs.version }}
          ARCH: ${{ matrix.goarch }}
        run: |
          STAGE="axonasp-freebsd-${ARCH}"
          mkdir -p "${STAGE}"
          cp axonasp-http axonasp-fastcgi axonasp-cli axonasp-mcp \
             axonasp-admin axonasp-service axonasp-testsuite axonasp-fpm "${STAGE}/"
          cp -r www config mcp LICENSE.txt LEGAL-DISCLAIMER.md global.asa "${STAGE}/"
          tar -cJf "axonasp-freebsd-${VERSION}-${ARCH}.tar.xz" "${STAGE}/"
          ls -la axonasp-freebsd-*.tar.xz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: axonasp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.deb
            *.rpm
            *.apk
            *.pkg.tar.zst
            *.zip
            *.tar.xz
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────
  # WASM build (js/wasm) — separate because it has a single output
  # ──────────────────────────────────────────────────────────────
  build-wasm:
    name: Build js/wasm
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download patched workspace
        uses: actions/download-artifact@v4
        with:
          name: patched-workspace
          path: .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build WASM
        env:
          GOOS: js
          GOARCH: wasm
          CGO_ENABLED: "0"
          FULL_VERSION: ${{ needs.sync.outputs.version }}
        run: |
          set -e
          go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o wasm/axonasp.wasm ./wasm/main.go
          # Bundle the official wasm_exec.js runtime shim from the toolchain
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" wasm/
          ls -la wasm/axonasp.wasm wasm/wasm_exec.js

      - name: Create WASM zip
        env:
          VERSION: ${{ needs.sync.outputs.version }}
        run: |
          STAGE="axonasp-wasm"
          mkdir -p "${STAGE}"
          cp wasm/axonasp.wasm wasm/wasm_exec.js wasm/index.htm wasm/axonasp.css "${STAGE}/"
          zip -r "axonasp-wasm-${VERSION}.zip" "${STAGE}/"
          ls -la axonasp-wasm-*.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: axonasp-wasm
          path: "*.zip"
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────
  # Windows installer (Inno Setup) — runs on a Windows runner
  # ──────────────────────────────────────────────────────────────
  build-windows-installer:
    name: Build Windows installer ${{ matrix.arch }}
    needs: [sync, build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows binaries from build job
        uses: actions/download-artifact@v4
        with:
          name: axonasp-windows-${{ matrix.arch }}
          path: .

      - name: Extract Windows zip
        run: |
          $zip = Get-ChildItem axonasp-windows-*.zip | Select-Object -First 1
          Expand-Archive -Path $zip.Name -DestinationPath . -Force
          # Find the extracted subdirectory and rename it to 'installer-src'
          $subdir = Get-ChildItem -Directory | Where-Object { $_.Name -like "axonasp-windows-*" } | Select-Object -First 1
          if ($subdir) {
            Rename-Item -Path $subdir.FullName -NewName "installer-src"
          }
          # Copy installer.iss and resources into the source directory
          Copy-Item installer.iss installer-src\
          Copy-Item -Recurse resources installer-src\resources -Force
          Get-ChildItem installer-src\*.exe
        shell: pwsh

      - name: Build installer with Inno Setup
        env:
          VERSION: ${{ needs.sync.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          cd installer-src
          $verInfo = ($env:VERSION -split '\.')[0..2] -join '.'
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion="$env:VERSION" /DMyArchSuffix="$env:ARCH" /DMyVersionInfoVersion="$verInfo" installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem Output\*.exe
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: axonasp-installer-${{ matrix.arch }}
          path: installer-src\Output\*.exe
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────
  # macOS .pkg installer — runs on a macOS runner
  # ──────────────────────────────────────────────────────────────
  build-macos-installer:
    name: Build macOS pkg ${{ matrix.arch }}
    needs: [sync, build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: macos-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS binaries from build job
        uses: actions/download-artifact@v4
        with:
          name: axonasp-darwin-${{ matrix.arch }}
          path: .

      - name: Extract macOS zip
        run: |
          zip=$(ls axonasp-macos-*.zip | head -n1)
          unzip -q "$zip"
          ls -la axonasp-macos-*/

      - name: Build .pkg installer
        env:
          VERSION: ${{ needs.sync.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -e
          STAGE="axonasp-macos-${ARCH}"
          PKGROOT="pkgroot"

          # Build payload tree under /opt/axonasp
          mkdir -p "${PKGROOT}/opt/axonasp"
          cp -R "${STAGE}/"* "${PKGROOT}/opt/axonasp/"

          # Create postinstall script: symlink binaries to /usr/local/bin
          mkdir -p scripts
          cat > scripts/postinstall <<'SCRIPT'
          #!/bin/bash
          set -e
          for bin in axonasp-http axonasp-fastcgi axonasp-cli axonasp-mcp axonasp-admin axonasp-service axonasp-testsuite axonasp-fpm; do
              if [ -f "/opt/axonasp/$bin" ]; then
                  ln -sf "/opt/axonasp/$bin" "/usr/local/bin/$bin"
              fi
          done
          mkdir -p /etc/axonasp
          if [ -f /opt/axonasp/config/axonasp.toml ]; then
              ln -sf /opt/axonasp/config/axonasp.toml /etc/axonasp/axonasp.toml
          fi
          SCRIPT
          chmod +x scripts/postinstall

          # Package
          pkgbuild \
            --root "${PKGROOT}" \
            --identifier com.g3pix.axonasp \
            --version "${VERSION}" \
            --scripts scripts \
            --install-location / \
            "axonasp-macos-${VERSION}-${ARCH}.pkg"

          ls -la *.pkg

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: axonasp-macos-pkg-${{ matrix.arch }}
          path: "*.pkg"
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────
  # FreeBSD .pkg installer — built via native Go tool on Linux
  # ──────────────────────────────────────────────────────────────
  build-freebsd-pkg:
    name: Build FreeBSD pkg ${{ matrix.arch }}
    needs: [sync, build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download FreeBSD tarball from build job
        uses: actions/download-artifact@v4
        with:
          name: axonasp-freebsd-${{ matrix.arch }}
          path: .

      - name: Extract tarball and build .pkg
        env:
          VERSION: ${{ needs.sync.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -e
          tarball=$(ls -1 axonasp-freebsd-*.tar.xz | head -n1)
          echo ">>> using $tarball"

          STAGE=/tmp/axonasp-stage
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          tar -xJf "$tarball" -C "$STAGE"

          # Flatten: tarball contains axonasp-freebsd-<arch>/* → move to $STAGE/opt/axonasp/
          SUBDIR=$(ls "$STAGE" | head -n1)
          mkdir -p "$STAGE/opt/axonasp"
          mv "$STAGE/$SUBDIR"/* "$STAGE/opt/axonasp/" 2>/dev/null || true
          rm -rf "$STAGE/$SUBDIR"

          # Build the pkg creator tool (now part of main module)
          go build -o /tmp/freebsd-pkg ./tools/freebsd-pkg

          # Architecture tag for FreeBSD pkg
          if [ "${ARCH}" = "amd64" ]; then
            FB_ARCH="FreeBSD:14:amd64"
          else
            FB_ARCH="FreeBSD:14:aarch64"
          fi

          # post-install script
          POST_INSTALL=$(cat <<'EOF'
          #!/bin/sh
          for bin in axonasp-http axonasp-fastcgi axonasp-cli axonasp-mcp axonasp-admin axonasp-service axonasp-testsuite axonasp-fpm; do
              if [ -f "/opt/axonasp/$bin" ]; then
                  ln -sf "/opt/axonasp/$bin" "/usr/local/bin/$bin"
              fi
          done
          EOF
          )

          DEINSTALL=$(cat <<'EOF'
          #!/bin/sh
          for bin in axonasp-http axonasp-fastcgi axonasp-cli axonasp-mcp axonasp-admin axonasp-service axonasp-testsuite axonasp-fpm; do
              rm -f "/usr/local/bin/$bin"
          done
          EOF
          )

          /tmp/freebsd-pkg \
            "axonasp-freebsd-${VERSION}-${ARCH}.pkg" \
            axonasp \
            "${VERSION}" \
            "${FB_ARCH}" \
            /opt/axonasp \
            "$STAGE/opt/axonasp" \
            "$POST_INSTALL" \
            "$DEINSTALL"

          ls -la *.pkg

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: axonasp-freebsd-pkg-${{ matrix.arch }}
          path: "*.pkg"
          if-no-files-found: error

  docker:
    name: Build Docker :nightly
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download patched workspace
        uses: actions/download-artifact@v4
        with:
          name: patched-workspace
          path: .
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push :nightly image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:nightly
          build-args: VERSION=${{ needs.sync.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
      - name: Smoke test — start container
        run: docker run -d --name axonasp-nightly -p 8801:8801 ghcr.io/${{ github.repository }}:nightly
      - name: Smoke test — wait for HTTP
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8801/ > /dev/null 2>&1; then
              echo "Server is up after ${i} seconds"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time"
          docker logs axonasp-nightly
          exit 1
      - name: Print container logs on failure
        if: failure()
        run: docker logs axonasp-nightly
      - name: Stop and remove container
        if: always()
        run: docker rm -f axonasp-nightly || true

  release:
    name: Publish nightly release
    needs: [sync, build, build-wasm, build-windows-installer, build-macos-installer, build-freebsd-pkg, docker]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RETAIN_NIGHTLY_RELEASES: 7
    steps:
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ARTIFACTS=$(gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name != "patched-workspace" and (.name | test("dockerbuild") | not)) | "\(.name)\t\(.archive_download_url)"')
          echo "$ARTIFACTS" | while IFS=$'\t' read -r name url; do
            echo ">>> Downloading $name ..."
            gh api "$url" > "/tmp/$name.zip"
            mkdir -p "artifacts/$name"
            unzip -q -o "/tmp/$name.zip" -d "artifacts/$name"
            rm -f "/tmp/$name.zip"
          done
      - name: Compute release tag and name
        id: release-tag
        run: |
          DATE_STR=$(date -u +%Y%m%d)
          SHORT_SHA=$(echo "${{ needs.sync.outputs.upstream-sha }}" | cut -c1-7)
          echo "tag=nightly-${DATE_STR}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Nightly Build ${DATE_STR} (upstream ${SHORT_SHA})" >> "$GITHUB_OUTPUT"
      - name: List release assets
        run: find artifacts -type f | sort
      - name: Publish nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: ${{ steps.release-tag.outputs.name }}
          prerelease: true
          make_latest: 'false'
          body: |
            Automated nightly build.

            **Upstream commit:** `${{ needs.sync.outputs.upstream-sha }}`
            **Upstream date:** ${{ needs.sync.outputs.upstream-date }}
            **Built:** ${{ github.run_id }}

            This is an unverified automated build from the latest upstream code
            plus this fork's packaging patches. Not for production use.
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.apk
            artifacts/**/*.pkg.tar.zst
            artifacts/**/*.zip
            artifacts/**/*.tar.xz
            artifacts/**/*.pkg
            artifacts/**/*installer*.exe
      - name: Prune old nightly releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RETAIN=${RETAIN_NIGHTLY_RELEASES:-7}
          echo "Pruning nightly releases, keeping the latest ${RETAIN}..."
          # List all nightly releases (tag starts with "nightly-") sorted by created_at desc
          RELEASES=$(gh api "/repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq '.[] | select(.tag_name | startswith("nightly-")) | "\(.id)\t\(.tag_name)\t\(.created_at)"' \
            | sort -k3 -r)
          COUNT=$(echo "$RELEASES" | grep -c . || true)
          echo "Found ${COUNT} nightly releases total"
          if [ "$COUNT" -le "$RETAIN" ]; then
            echo "Nothing to prune (${COUNT} <= ${RETAIN})"
            exit 0
          fi
          # Skip the first RETAIN entries, delete the rest
          echo "$RELEASES" | tail -n +$((RETAIN + 1)) | while IFS=$'\t' read -r id tag created; do
            echo "  Deleting $tag (created $created)..."
            gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/releases/$id"
            # Also delete the associated tag
            gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/git/refs/tags/$tag" || true
          done
          echo "Done pruning"
