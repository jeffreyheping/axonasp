#This is an example configuration file for the AxonASP FastCGI Process Manager (FPM). It is intended to be used as a template for setting up multiple sites with different configurations. Each site should have its own configuration file, and the FPM will manage the worker processes for each site based on these configurations. The configuration file should be placed in the fpm.d directory, and the FPM will automatically load all configuration files in that directory. For convention purposes, the configuration file should be named after the site it is configuring, for example, example.com.conf for the site example.com. The configuration file should be readable by the user running the FPM process. The configuration file should contain the necessary settings for the AxonASP application to run correctly, including the site name, user and group IDs, socket path, configuration file path, application path, memory limit, maximum restarts, and temporary directory.

#Sitename to be used in logs and process titles
site_name = "example.com" 

#User ID to run the process, this user should have write permissions to the socket path and the temporary directory specified in the configuration file. Also read permissions to the configuration file and the application path. 
uid = 1001

#Group ID to run the process, this group should have write permissions to the socket path and the temporary directory specified in the configuration file. Also read permissions to the configuration file and the application path. It is recommended to use a dedicated group for the AxonASP application to avoid conflicts with other applications or services running on the same server.
gid = 1001

#Socket path for FastCGI communication or TCP address, as we presume that the user is running a reverse proxy in front of the FastCGI server, we will use a Unix socket example for better performance and security. But you can also use a TCP address like "127.0.0.1:9000" or just a port like "9000" to listen on all interfaces.
socket = "/var/run/axonasp/example.com.sock"

#The path to the configuration file for the AxonASP application. This file should contain the necessary settings for the application to run correctly. The fastcgi.server_port will be ignored in the axonasp.toml file, as the FPM will handle the FastCGI socket or TCP address. This is intentional so the FPM can be set up for multiple sites while using the same AxonASP configuration file. It also allows for use in a shared hosting environment where automatization to set up a site can be achieved without modifying the configuration file for each site. Use the full path to the configuration file to avoid issues with the use of CWD. The configuration file should be readable by the user running the FPM process, and it should be located in a secure directory to prevent unauthorized access.
config_file = "/opt/axonasp/config/axonasp.toml"

#This is the path where the AxonASP executable will be run from (CWD). This is important for the AxonASP application to find its resources and operate correctly. It should point to the root directory of the web application.
app_path = "/opt/axonasp/"

#This is the global.asa **directory** for the site. This is important for the FPM to manage multiple sites correctly and to avoid conflicts between sites. Preferably, use an absolute path. It should also be readable by the user running the FPM process. The global.asa file is used by the AxonASP application to define application-level settings and events, and can be set for the root directory of the web application, like IIS, but ideally it should be located in a secure directory to prevent unauthorized access following modern security practices. The global.asa file is optional if the server don't find it, the AxonASP application will run without it. If you don't want to use a global.asa file, you can set this value to an empty string or comment it out.
global_asa_path = "/opt/axonasp/www/"

#This enforces a memory limit for the AxonASP worker process. If the process exceeds this limit, it will be restarted. This is a safety measure to prevent runaway processes from consuming too much memory and affecting the server's performance. It will limit the memory usage using the cgroup memory controller, which is a feature of the Linux kernel that allows for resource management of processes. The value is specified in megabytes (MB), it will also intruct the go runtime to try to keep the memory usage below this limit through the use of the GOGC environment variable, which controls the garbage collection target percentage. 
memory_limit_mb = 128

#The maximum number of times this worker process will be restarted if it crashes or is killed. This is a safety measure to prevent infinite restart loops in case of persistent errors. If the worker process exceeds this limit, the FPM will stop trying to restart it and will log an error message. Set to 0 to disable the restart limit, but this is not recommended as it can lead to resource exhaustion and instability of the server. 
max_restarts=3

#The user temporary directory for the AxonASP application. This is where temporary files will be stored during the execution of the application. It should be a directory that the AxonASP process has write permissions to, and it should be cleaned up regularly to prevent disk space issues.
tmp_dir = "/opt/axonasp/temp"

